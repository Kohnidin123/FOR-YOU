<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#140c22" />
    <title>Heart Beat Surprise</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page4">
    <div class="floating-hearts" aria-hidden="true">
      <span>💗</span>
      <span>💖</span>
      <span>💘</span>
      <span>💞</span>
    </div>

    <button id="musicToggle" class="music-toggle" type="button">🎵 Play Music</button>
    <audio id="bgMusic" loop preload="auto">
      <source src="https://j.top4top.io/m_3842man5m1.mp3" type="audio/mpeg" />
    </audio>
    <p class="music-label">Lagu: Pandangan Pertama - RAN</p>

    <div class="photo-fall" aria-hidden="true">
      <img class="photo-fall-item item-1" src="https://www.image2url.com/r2/default/images/1783611392099-5752f608-7831-4e28-a7d6-f45e2d1f0956.jpeg" alt="foto" />
      <img class="photo-fall-item item-2" src="https://www.image2url.com/r2/default/images/1783615785629-5a40d0c4-a894-467b-a1a3-fd3a2055836c.jpeg" alt="foto" />
      <img class="photo-fall-item item-3" src="https://www.image2url.com/r2/default/images/1783616449771-9a18b2b3-80b9-44fc-b682-79b2b396727e.jpeg" alt="foto" />
      <img class="photo-fall-item item-4" src="https://www.image2url.com/r2/default/images/1783616553836-e4e3fe3f-0def-408b-9884-736c8019031f.jpeg" alt="foto" />
    </div>

    <main class="page-shell">
      <section class="page-card page-card-heart">
        <div class="heart-stage" aria-hidden="true">
          <div class="heart-beat">
            <span class="heart"></span>
          </div>
        </div>
        <div class="hero-actions" style="justify-content: center; gap: 14px; margin-top: 8px;">
          <a href="index.html" class="btn btn-primary">Balik ke halaman awal</a>
        </div>
      </section>
    </main>

    <script src="./scripts.js"></script>
  </body>
</html>
